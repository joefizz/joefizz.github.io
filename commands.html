<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Commands Repo</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f0e8;
        color: #1a1a18;
        font-family: Inter, system-ui, sans-serif;
      }
      .page {
        max-width: 640px;
        width: 100%;
        padding: 36px;
      }
      .card {
        background: white;
        border: 1px solid #d8d2c4;
        border-radius: 14px;
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
        padding: 32px;
      }
      h1 {
        margin: 0 0 14px;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.05;
      }
      p {
        margin: 0 0 22px;
        color: #57514a;
        line-height: 1.7;
      }
      a {
        display: inline-block;
        background: #c84b2f;
        color: #ffffff;
        text-decoration: none;
        border-radius: 10px;
        padding: 14px 22px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="card">
        <h1>Frequently used commands</h1>
        <p>This page links to your repo of frequently used commands.</p>
        <a href="https://github.com/joefizz/commands" target="_blank" rel="noopener noreferrer">Open commands repo</a>
      </div>
    </div>
  </body>
</html>
